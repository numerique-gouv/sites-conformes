{% load i18n wagtailcore_tags wagtailadmin_tags static %}
{% block extra_css %}{% endblock %}
{% for item in information_items %}
  <div class="fr-notice fr-notice--{{ item.type|default:"info" }}"
       style="margin-bottom: 1rem;
              border-radius: 4px;
              overflow: hidden">
    <div class="fr-container">
      <div class="fr-notice__body">
        <div style="display: flex;
                    justify-content: space-between;
                    align-items: flex-start;
                    width: 100%">
          <div>
            <p class="fr-notice__title" style="margin-bottom: 0.25rem;">
              {{ item.title }}
              {% if item.date %}
                <span style="font-weight: normal; opacity: 0.7; font-size: 0.875rem;">— {{ item.date }}</span>
              {% endif %}
            </p>
            <p style="margin: 0;">
              {{ item.description }}
              {% if item.url %}
                <a href="{{ item.url }}">{% trans "En savoir plus" %}</a>
              {% endif %}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endfor %}
