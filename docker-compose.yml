services:
  db:
    image: postgres:14.5-alpine
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
      PGPORT: ${DATABASE_PORT}
    ports:
      - "${DATABASE_PORT}:${DATABASE_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${DATABASE_USER}:${DATABASE_PASSWORD}@db:${DATABASE_PORT}/${DATABASE_NAME}
    ports:
      - "${HOST_PORT}:${HOST_PORT}"
    volumes:
      - .:/app
      - medias:/app/medias
      - staticfiles:/app/staticfiles
      - nginx_conf:/app/nginx
    depends_on:
      - db

  rproxy:
    image: docker.io/nginx:latest
    restart: always
    volumes:
      - nginx_conf:/etc/nginx/conf.d
      - staticfiles:/usr/share/nginx/html/static
      - medias:/usr/share/nginx/html/medias
    ports:
      - "${CONTAINER_PORT}:${CONTAINER_PORT}"
    depends_on:
      - web
    healthcheck:
      test: ["CMD-SHELL","if [ `wc -l < /etc/nginx/conf.d/default.conf` = 1 ]; then sleep 300 && nginx -s stop; fi || exit 1"]
      interval: 30s
      timeout: 2s
      retries: 1

volumes:
  postgres_data:
  medias:
  staticfiles:
  nginx_conf:
