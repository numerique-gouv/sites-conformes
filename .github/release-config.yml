name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Fonctionnalités'
    labels:
      - 'amélioration'
  - title: '🐛 Corrections de bug'
    labels:
      - 'bug'
      - 'sécurité'
  - title: '📗 Documentation'
    labels:
      - 'documentation'
  - title: '🔗 Montées de versions'
    labels:
      - 'dépendances'
      - 'dependencies'
      - 'python'
      - 'javascript'
      - 'python:uv'
  - title: '🧰 Technique'
    labels:
      - 'design-system'
      - 'composants'
      - 'accessibilité'
      - 'docker'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
  patch:
    labels:
      - 'patch'
  default: patch

template: |
  ## Changements

  $CHANGES
