name: Setup E2E Tools
description: Install Node.js, npm dependencies, and Playwright Chromium

runs:
  using: composite
  steps:
    # Match the official Playwright CI guide:
    # https://playwright.dev/docs/ci-intro#setting-up-github-actions
    # Use the Node LTS (not 24) — the post-download install hang we observed
    # only appeared on the pinned Node 24, never in the documented LTS setup.
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install Node dependencies
      shell: bash
      run: npm ci

    # Install browsers + system deps exactly as the official guide prescribes.
    - name: Install Playwright Browsers
      shell: bash
      run: npx playwright install --with-deps
