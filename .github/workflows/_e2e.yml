name: End-to-end test job

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      compare:
        required: true
        type: boolean

env:
  DJANGO_SETTINGS_MODULE: config.settings_test
  SCREENSHOTS_BASE_PATH: __screenshots__

jobs:
  end-to-end:
    name: Playwright (${{ inputs.ref }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dju
          POSTGRES_PASSWORD: djpwd
          POSTGRES_DB: djdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # When running against main, overlay current-branch test files so both
      # baseline and comparison jobs use the same test definitions.
      - name: Checkout E2E files from PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          sparse-checkout: |
            playwright.config.ts
            pyproject.toml
            e2e/
            .github/
            .env.test
            justfile
            scripts/
          path: __e2e_overlay__

      - name: Overlay E2E files onto working tree
        shell: bash
        run: |
          shopt -s dotglob
          cp -r __e2e_overlay__/* .
          rm -rf __e2e_overlay__

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Python
        uses: actions/setup-python@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --no-group dev

      - name: Copy .env.test to .env
        run: cp .env.test .env

      - name: Collect static files
        run: just collectstatic

      - name: Deploy starter content + demo pages
        run: |
          just init
          uv run python manage.py create_demo_pages

      - name: Setup E2E tools
        uses: ./.github/actions/setup-e2e

      # The Django server is started by Playwright's `webServer` config (see
      # playwright.config.ts), which boots `runserver` with the env it needs and
      # waits for readiness — so there is no separate server step here.

      - name: Download baseline screenshots
        if: inputs.compare
        uses: actions/download-artifact@v4
        with:
          name: regression-screenshots
          path: ${{ env.SCREENSHOTS_BASE_PATH }}

      # Baseline mode: run the full suite and (re)generate every snapshot, then
      # upload them as the trusted baseline. This step never fails on a visual
      # diff — that is the point of a baseline.
      - name: Run Playwright tests (full suite + generate snapshots)
        if: ${{ !inputs.compare }}
        run: npx playwright test --update-snapshots

      # Compare mode: render only the @regression tests and assert each one
      # matches the baseline downloaded above. NO --update-snapshots here, so a
      # visual diff makes this step (and the job) fail.
      - name: Run Playwright tests (regression comparison only)
        if: inputs.compare
        run: npx playwright test --grep=@regression

      - name: Upload baseline screenshots
        if: ${{ !inputs.compare }}
        uses: actions/upload-artifact@v4
        with:
          name: regression-screenshots
          path: ${{ env.SCREENSHOTS_BASE_PATH }}

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ inputs.compare && 'compare' || 'baseline' }}
          path: playwright-report/
          retention-days: 7

      # On a comparison failure Playwright writes the expected/actual/diff PNGs
      # plus the error context under test-results/. Upload that whole tree so a
      # visual regression is reviewable from the run page.
      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diffs-${{ inputs.compare && 'compare' || 'baseline' }}
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

permissions:
  contents: read
