name: CI
on:
  workflow_call:

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
      PYTHONPATH: .
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dju
          POSTGRES_PASSWORD: djpwd
          POSTGRES_DB: djdb
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Set up Python 3.14
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - uses: pre-commit/action@v3.0.1
      - name: Black & ruff on all files
        run: just quality

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dju
          POSTGRES_PASSWORD: djpwd
          POSTGRES_DB: djdb
          POSTGRESQL_VERSION: "17"
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Set up Python 3.14
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --no-group dev
      - name: Copy empty .env.test to .env
        run: cp .env.test .env
      - name: Collect static files
        run: just collectstatic
      - name: Run the unit tests
        run: just unittest
      - name: Deploy starter content
        run: |
          just init
          uv run python manage.py create_demo_pages

  migrations:
    name: Migrations check
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
      PYTHONPATH: .
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dju
          POSTGRES_PASSWORD: djpwd
          POSTGRES_DB: djdb
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.14 with uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --no-group dev
      - name: Copy empty .env.test to .env
        run: cp .env.test .env
      - name: Check pending migrations
        run: uv run django-admin makemigrations --check --dry-run --noinput

  i18n:
    name: i18n check
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: config.settings_test
      PYTHONPATH: .
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: dju
          POSTGRES_PASSWORD: djpwd
          POSTGRES_DB: djdb
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Set up Python 3.14
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --no-group dev
      - name: Copy empty .env.test to .env
        run: cp .env.test .env
      - name: Check internationalization
        run: |
          just makemessages
          just compilemessages
          git diff --exit-code sites_conformes/locale/
          git diff --exit-code sites_conformes/*/locale/
