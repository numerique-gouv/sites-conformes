# See https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
# for a detailed guide.
#
# Triggers on GitHub Release publish or manually via workflow_dispatch.
# The release tag IS the package version: cutting a release named e.g. v4.0.0
# publishes sites-conformes==4.0.0 to PyPI. There is no manual version bump
# in pyproject.toml.
#
# The version lives in sites_conformes/_version.py, committed on main. It is the
# single source of truth, read both by setuptools at build time and by
# sites_conformes/__init__.py at runtime — so every deployment mode (Scalingo, an
# internal server, the Docker image) runs the right number without extra wiring.
#
# Because main is protected (changes must go through a pull request), the bump is
# NOT done from here. Run the "Prepare release" workflow first: it opens a PR
# setting _version.py to the target version. Merge it, then cut the GitHub
# Release on main. This job only checks that the tag and the committed version
# agree, then builds and publishes.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up uv
        uses: astral-sh/setup-uv@v5

      # Guard against publishing a wheel whose version disagrees with the tag —
      # which would also mean main (and therefore Scalingo) is running a
      # different number than the one being released.
      - name: Check _version.py matches the release tag
        if: github.event_name == 'release'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          EXPECTED="${TAG#v}"
          ACTUAL=$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' sites_conformes/_version.py)
          echo "Tag: ${EXPECTED} — _version.py: ${ACTUAL}"
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::_version.py is at '${ACTUAL}' but the release tag is '${EXPECTED}'."
            echo "::error::Run the 'Prepare release' workflow for ${EXPECTED}, merge the PR it opens, then re-cut this release."
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: none
      id-token: write  # required for PyPI trusted publishing
    environment: publish
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true
          skip-existing: true
